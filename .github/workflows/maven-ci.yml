# name: Java CI with Maven
name: Build and Push Docker Image

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout Source Code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: maven

        - name: Build and Test with Maven
          # run: mvn -B clean package --file pom.xml
          run: mvn clean package -DskipTests

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        # - name: Set lower case owner name
        #   run: |
        #     # Explicitly force lowercase on the username and project name string
        #     RAW_USER="${{ secrets.DOCKERHUB_USERNAME }}"
        #     echo "DOCKER_IMAGE_NAME=$(echo "$RAW_USER/cicd-demo" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        # - name: Downcase Repository Owner Name
        #   run: |
        #     echo "DOCKER_USER=$(echo '${{ secrets.DOCKER_USERNAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

        - name: Build and Push Docker Image
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: |
                ovie2604/cicd-demo:latest
                ovie2604/cicd-demo:${{ github.sha }}